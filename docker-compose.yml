services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: thesis_pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vectordb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vectordb}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: thesis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./_pgadmin_data:/var/lib/pgadmin
      - ./_pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  guardrails_ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GUARDRAILS_TOKEN=${GURADRAILS_AI_TOKEN}
    container_name: thesis_guardrails_ai
    ports:
      - "8000:8000"
    restart: unless-stopped
