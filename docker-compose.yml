services:
  # Dedicated instance for the langchain RAG vector store (pgvector extension required).
  postgres_rag:
    image: pgvector/pgvector:pg16
    container_name: thesis_postgres_rag
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vectordb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vectordb}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Dedicated instance for the SQLAlchemy/Alembic ORM (evaluation) data — no pgvector needed.
  postgres_eval:
    image: postgres:16
    container_name: thesis_postgres_eval
    environment:
      POSTGRES_USER: ${EVAL_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${EVAL_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${EVAL_DB_NAME:-evaluation_db}
    ports:
      - "${EVAL_DB_PORT:-5433}:5432"
    volumes:
      - ./_pgdata_eval:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${EVAL_DB_USER:-postgres} -d ${EVAL_DB_NAME:-evaluation_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: thesis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./_pgadmin_data:/var/lib/pgadmin
      - ./_pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres_rag:
        condition: service_healthy
      postgres_eval:
        condition: service_healthy
    restart: unless-stopped

  # the PyPi dependency is currently in quarantine
  #  guardrails_ai:
  #    build:
  #      context: .
  #      dockerfile: Dockerfile.guardrails
  #      args:
  #        - GUARDRAILS_TOKEN=${GURADRAILS_AI_TOKEN}
  #    container_name: thesis_guardrails_ai
  #    ports:
  #      - "8000:8000"
  #    restart: unless-stopped

  testframework:
    build:
      context: .
      dockerfile: Dockerfile.testframework
    container_name: thesis_testframework
    env_file: .env
    environment:
      # Override host-specific values so they point to compose service names / container paths
      POSTGRES_HOST: postgres_rag
      POSTGRES_PORT: 5432
      EVAL_DB_HOST: postgres_eval
      EVAL_DB_PORT: 5432
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-evaluation}
      HF_HOME: /root/.cache/huggingface
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    volumes:
      # Results and analysis outputs — stored on the host
      - ./_runs:/app/_runs
      # Input data — CSV attack prompts and PDF files
      - ./_prompt_files:/app/_prompt_files
      - ./_attack_documents:/app/_attack_documents
      - ./_rag_documents:/app/_rag_documents
      # Log files
      - ./_logs:/app/_logs
      # HuggingFace model cache (LlamaFirewall) — reuse host cache to avoid re-downloads
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      # GCP Application Default Credentials (read-only)
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    extra_hosts:
      # Allows the container to reach Ollama running on the Docker host
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres_rag:
        condition: service_healthy
      postgres_eval:
        condition: service_healthy
    #      guardrails_ai:
    #        condition: service_started
    # profiles: [run] keeps this service out of `docker compose up` (infrastructure only).
    # Use: docker compose run --rm testframework <command> [args...]
    profiles:
      - run

  api:
    build:
      context: .
      dockerfile: Dockerfile.testframework
    container_name: thesis_api
    command: [ "serve" ]
    env_file: .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      EVAL_DB_HOST: postgres_eval
      EVAL_DB_PORT: 5432
      POSTGRES_HOST: postgres_rag
      POSTGRES_PORT: 5432
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-evaluation}
      HF_HOME: /root/.cache/huggingface
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Results and analysis outputs — stored on the host
      - ./_runs:/app/_runs
      # Input data — CSV attack prompts and PDF files. W1 (POST /test-runs) triggers the
      # same real DefaultTest suite as `run-baseline`, so it needs the exact same mounts.
      - ./_prompt_files:/app/_prompt_files
      - ./_attack_documents:/app/_attack_documents
      - ./_rag_documents:/app/_rag_documents
      # Log files
      - ./_logs:/app/_logs
      # HuggingFace model cache (LlamaFirewall) — reuse host cache to avoid re-downloads
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      # GCP Application Default Credentials (read-only)
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    extra_hosts:
      # Allows the container to reach Ollama running on the Docker host
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres_eval:
        condition: service_healthy
      postgres_rag:
        condition: service_healthy
    restart: unless-stopped
    # NOTE: intentionally NOT under `profiles: [run]`, so `docker compose up` starts it.
